<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA: Web App Manifest (Android + Chrome) -->
    <link rel="manifest" href="/manifest.json" />

    <!-- PWA: Theme & Colors -->
    <meta name="theme-color" content="#1e3a5f" />
    <meta name="background-color" content="#1e3a5f" />
    <meta name="msapplication-navbutton-color" content="#1e3a5f" />

    <!-- iOS: Add to Home Screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GE Driver" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- iOS: Splash Screens (prevents white flash on launch) -->
    <link rel="apple-touch-startup-image" href="/icon-512.png"
      media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/icon-512.png"
      media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/icon-512.png"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/icon-512.png"
      media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" />

    <!-- Android: Chrome specific -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

    <title>Gemini Express — Driver</title>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        background: #f8f9fa;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        /* Prevent pull-to-refresh on mobile */
        overscroll-behavior-y: contain;
        /* Safe area for notched phones */
        padding-top: env(safe-area-inset-top);
      }
      /* Prevent iOS text size adjust */
      html { -webkit-text-size-adjust: 100%; }
      /* Smooth scrolling */
      * { -webkit-overflow-scrolling: touch; }
      /* Remove tap highlight on mobile */
      * { -webkit-tap-highlight-color: transparent; }
      /* Fix input zoom on iOS (font size < 16px triggers zoom) */
      input, select, textarea { font-size: 16px !important; }
      /* Install banner */
      #install-banner {
        display: none;
        position: fixed; bottom: 70px; left: 12px; right: 12px;
        background: #1e3a5f; color: white; border-radius: 12px;
        padding: 14px 16px; z-index: 9999;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        animation: slideUp 0.3s ease-out;
      }
      @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Install Banner (shown on mobile browsers) -->
    <div id="install-banner">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:14px;font-weight:700">Install Gemini Express</div>
          <div style="font-size:12px;opacity:0.7;margin-top:2px">Add to home screen for quick access</div>
        </div>
        <div style="display:flex;gap:8px">
          <button id="install-dismiss" style="padding:8px 12px;font-size:12px;background:transparent;border:1px solid rgba(255,255,255,0.3);color:white;border-radius:8px;cursor:pointer">Later</button>
          <button id="install-accept" style="padding:8px 16px;font-size:12px;font-weight:600;background:#2563eb;border:none;color:white;border-radius:8px;cursor:pointer">Install</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      // ── Service Worker Registration ────────────────────
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[PWA] Service worker registered:', reg.scope))
            .catch(err => console.log('[PWA] SW registration failed:', err));
        });
      }

      // ── Android: Install Prompt ────────────────────────
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Show install banner if not already installed
        if (!window.matchMedia('(display-mode: standalone)').matches) {
          document.getElementById('install-banner').style.display = 'block';
        }
      });

      document.getElementById('install-accept')?.addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const result = await deferredPrompt.userChoice;
          console.log('[PWA] Install result:', result.outcome);
          deferredPrompt = null;
        }
        document.getElementById('install-banner').style.display = 'none';
      });

      document.getElementById('install-dismiss')?.addEventListener('click', () => {
        document.getElementById('install-banner').style.display = 'none';
      });

      // ── iOS: Show install instructions ─────────────────
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      const isStandalone = window.navigator.standalone === true;
      if (isIOS && !isStandalone && !sessionStorage.getItem('ios-prompt-dismissed')) {
        setTimeout(() => {
          const banner = document.getElementById('install-banner');
          if (banner) {
            banner.querySelector('div > div:first-child').innerHTML =
              '<div style="font-size:14px;font-weight:700">Install Gemini Express</div>' +
              '<div style="font-size:12px;opacity:0.7;margin-top:2px">Tap <strong>Share</strong> ↑ then <strong>"Add to Home Screen"</strong></div>';
            banner.querySelector('#install-accept').style.display = 'none';
            banner.querySelector('#install-dismiss').textContent = 'Got it';
            banner.querySelector('#install-dismiss').addEventListener('click', () => {
              sessionStorage.setItem('ios-prompt-dismissed', 'true');
            });
            banner.style.display = 'block';
          }
        }, 3000);
      }

      // ── Online/Offline Detection ───────────────────────
      window.addEventListener('online', () => {
        document.body.style.borderTop = '';
        // Trigger background sync
        if ('serviceWorker' in navigator && 'SyncManager' in window) {
          navigator.serviceWorker.ready.then(reg => reg.sync.register('sync-status-updates'));
        }
      });
      window.addEventListener('offline', () => {
        document.body.style.borderTop = '3px solid #ef4444';
      });
    </script>
  </body>
</html>
