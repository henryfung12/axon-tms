<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Express — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #1e3a5f; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .container { text-align: center; max-width: 320px; }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; opacity: 0.7; line-height: 1.5; margin-bottom: 24px; }
    button { padding: 14px 32px; font-size: 16px; font-weight: 600; background: #2563eb; color: white; border: none; border-radius: 10px; cursor: pointer; }
    .info { font-size: 12px; opacity: 0.5; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>No internet connection. Your pending status updates and documents will sync automatically when you're back online.</p>
    <button onclick="window.location.reload()">Try Again</button>
    <p class="info">Last synced data is still available.<br>Drive safe.</p>
  </div>
</body>
</html>
